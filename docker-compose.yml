services:

  keycloak:
    image: quay.io/keycloak/keycloak:23.0.4
    container_name: keycloak

    command:
      - start-dev
      - --import-realm
      - --hostname-strict=false
      - --hostname-strict-https=false

    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin

      KC_HTTP_ENABLED: "true"
      KC_HTTP_PORT: "8080"

      KC_HOSTNAME: 192.168.100.90
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"

      KC_DB: dev-file

    ports:
      - "8080:8080"

    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json

    networks:
      - lab-network

  api:
    build:
      context: ./api
      dockerfile: Dockerfile

    container_name: protected-api

    environment:
      KEYCLOAK_URL: "http://192.168.100.90:8080"
      KEYCLOAK_REALM: "eoc-realm"
      JWKS_URI: "http://192.168.100.90:8080/realms/eoc-realm/protocol/openid-connect/certs"
      ISSUER: "http://192.168.100.90:8080/realms/eoc-realm"
      PORT: "3000"

    ports:
      - "3000:3000"

    networks:
      - lab-network

networks:
  lab-network:
    driver: bridge
