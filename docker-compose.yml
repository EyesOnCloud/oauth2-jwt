services:

  keycloak:
    image: quay.io/keycloak/keycloak:23.0.4
    container_name: keycloak
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HTTP_PORT: 8080
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
      KC_HTTP_ENABLED: "true"
    ports:
      - "8080:8080"
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json
    networks:
      - lab-network
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/realms/lab-realm/.well-known/openid-configuration || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 60s

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: protected-api
    environment:
      KEYCLOAK_URL: "http://keycloak:8080"
      KEYCLOAK_REALM: "lab-realm"
      JWKS_URI: "http://keycloak:8080/realms/lab-realm/protocol/openid-connect/certs"
      ISSUER: "http://keycloak:8080/realms/lab-realm"
      PORT: "3000"
    ports:
      - "3000:3000"
    depends_on:
      keycloak:
        condition: service_healthy
    networks:
      - lab-network

networks:
  lab-network:
    driver: bridge
